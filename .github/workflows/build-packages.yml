name: Build packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to upload packages to, for example v1.8-20221120"
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  PACKAGES: luci-app-adguardhome luci-i18n-adguardhome-zh-cn

jobs:
  build:
    name: OpenWrt ${{ matrix.openwrt }} ${{ matrix.format }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt: 24.10.7
            arch: x86_64-24.10.7
            format: ipk
            package_glob: "*.ipk"
          - openwrt: 25.12.4
            arch: x86_64-25.12.4
            format: apk
            package_glob: "*.apk"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          BUILD_LOG: 1
          PACKAGES: ${{ env.PACKAGES }}
          V: s

      - name: Collect packages
        shell: bash
        run: |
          set -euo pipefail
          output_dir="dist/openwrt-${{ matrix.openwrt }}-${{ matrix.format }}"
          mkdir -p "$output_dir"
          find bin/packages -type f -name '${{ matrix.package_glob }}' -print -exec cp -v '{}' "$output_dir/" ';'
          test -n "$(find "$output_dir" -type f -name '${{ matrix.package_glob }}' -print -quit)"
          (
            cd "$output_dir"
            sha256sum * > "SHA256SUMS-openwrt-${{ matrix.openwrt }}-${{ matrix.format }}.txt"
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.openwrt }}-${{ matrix.format }}
          path: dist/openwrt-${{ matrix.openwrt }}-${{ matrix.format }}/*
          if-no-files-found: error

  release:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --notes "OpenWrt packages built for 24.10.7 (ipk) and 25.12.4 (apk)."
          fi
          find dist -type f \( -name '*.ipk' -o -name '*.apk' -o -name 'SHA256SUMS-*.txt' \) -print0 \
            | xargs -0 gh release upload "$RELEASE_TAG" --clobber
