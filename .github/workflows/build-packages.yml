name: Build packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to upload packages to, for example v1.8-20221120"
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  PACKAGE_NAME: luci-app-adguardhome
  LUCI_LANG: zh_Hans
  LUCI_LANG_PACKAGE: luci-i18n-adguardhome-zh-cn

jobs:
  build:
    name: OpenWrt ${{ matrix.openwrt }} ${{ matrix.format }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt: 24.10.7
            arch: x86_64-24.10.7
            format: ipk
            package_glob: "*.ipk"
          - openwrt: 25.12.4
            arch: x86_64-25.12.4
            format: apk
            package_glob: "*.apk"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          sdk_output="$PWD/sdk-output"
          mkdir -p "$sdk_output"
          docker run --rm \
            --volume "$PWD:/builder/localfeed/${{ env.PACKAGE_NAME }}:ro" \
            --volume "$sdk_output:/output" \
            "openwrt/sdk:${{ matrix.arch }}" \
            /bin/bash -euxo pipefail -c '
              cd /builder
              [ ! -f setup.sh ] || bash setup.sh
              sed \
                -e "s,https://git.openwrt.org/feed/,https://github.com/openwrt/," \
                -e "s,https://git.openwrt.org/openwrt/,https://github.com/openwrt/," \
                -e "s,https://git.openwrt.org/project/,https://github.com/openwrt/," \
                feeds.conf.default > feeds.conf
              echo "src-link action /builder/localfeed" >> feeds.conf
              ./scripts/feeds update -a
              ./scripts/feeds install -p action -f "${{ env.PACKAGE_NAME }}"
              {
                echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m"
                echo "CONFIG_LUCI_LANG_${{ env.LUCI_LANG }}=y"
                echo "CONFIG_PACKAGE_${{ env.LUCI_LANG_PACKAGE }}=m"
              } >> .config
              make defconfig
              make "package/${{ env.PACKAGE_NAME }}/download" V=s
              make "package/${{ env.PACKAGE_NAME }}/check" V=s
              make "package/${{ env.PACKAGE_NAME }}/compile" BUILD_LOG=1 CONFIG_AUTOREMOVE=y V=s -j"$(nproc)"
              find bin/packages -type f \( \
                -name "${{ env.PACKAGE_NAME }}*.${{ matrix.format }}" \
                -o -name "${{ env.LUCI_LANG_PACKAGE }}*.${{ matrix.format }}" \
              \) -print -exec cp -v "{}" /output/ ";"
            '
          sudo chown -R "$USER:$USER" "$sdk_output"

      - name: Collect packages
        shell: bash
        run: |
          set -euo pipefail
          output_dir="dist/openwrt-${{ matrix.openwrt }}-${{ matrix.format }}"
          mkdir -p "$output_dir"
          find sdk-output -type f -name '${{ matrix.package_glob }}' -print -exec cp -v '{}' "$output_dir/" ';'
          test -n "$(find "$output_dir" -type f -name '${{ env.PACKAGE_NAME }}*.${{ matrix.format }}' -print -quit)"
          test -n "$(find "$output_dir" -type f -name '${{ env.LUCI_LANG_PACKAGE }}*.${{ matrix.format }}' -print -quit)"
          (
            cd "$output_dir"
            sha256sum * > "SHA256SUMS-openwrt-${{ matrix.openwrt }}-${{ matrix.format }}.txt"
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.openwrt }}-${{ matrix.format }}
          path: dist/openwrt-${{ matrix.openwrt }}-${{ matrix.format }}/*
          if-no-files-found: error

  release:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --notes "OpenWrt packages built for 24.10.7 (ipk) and 25.12.4 (apk)."
          fi
          find dist -type f \( -name '*.ipk' -o -name '*.apk' -o -name 'SHA256SUMS-*.txt' \) -print0 \
            | xargs -0 gh release upload "$RELEASE_TAG" --clobber
